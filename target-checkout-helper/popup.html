<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Target Checkout Helper</h1>
      <label class="toggle">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>
    <p class="subtitle" id="statusText">Extension disabled</p>
  </header>

  <main>
    <!-- Product Monitor Section -->
    <section class="card">
      <h2>Product Monitor</h2>
      <div class="product-input-row">
        <input type="url" id="productUrl" placeholder="Paste Target product URL">
        <button id="addProductBtn" class="btn-icon">+</button>
      </div>
      <ul id="productList" class="product-list"></ul>
      <div id="monitorControls" style="display:none">
        <div class="monitor-interval">
          Retry every <input type="number" id="refreshInterval" value="1" min="1" max="60"> sec
        </div>
        <button id="monitorBtn" class="btn-monitor">Start Monitoring</button>
      </div>
      <p id="monitorStatus" class="monitor-status"></p>
    </section>

    <!-- Shipping Section -->
    <section class="card">
      <h2>Shipping</h2>
      <div class="field-row">
        <input type="text" id="firstName" placeholder="First name" autocomplete="given-name">
        <input type="text" id="lastName" placeholder="Last name" autocomplete="family-name">
      </div>
      <input type="text" id="address1" placeholder="Address line 1" autocomplete="address-line1">
      <input type="text" id="address2" placeholder="Address line 2 (optional)" autocomplete="address-line2">
      <div class="field-row">
        <input type="text" id="city" placeholder="City" autocomplete="address-level2">
        <select id="state" autocomplete="address-level1">
          <option value="">State</option>
          <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option>
          <option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option>
          <option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option>
          <option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option>
          <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option>
          <option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option>
          <option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option>
          <option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option>
          <option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option>
          <option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option>
          <option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option>
          <option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option>
          <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option>
          <option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option>
          <option value="TX">TX</option><option value="UT">UT</option><option value="VT">VT</option>
          <option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option>
          <option value="WI">WI</option><option value="WY">WY</option><option value="DC">DC</option>
        </select>
      </div>
      <div class="field-row">
        <input type="text" id="zip" placeholder="ZIP code" autocomplete="postal-code" maxlength="10">
        <input type="tel" id="phone" placeholder="Phone" autocomplete="tel">
      </div>
    </section>

    <!-- Payment Section -->
    <section class="card">
      <h2>Payment</h2>
      <input type="text" id="cardNumber" placeholder="Card number" autocomplete="cc-number" maxlength="19">
      <div class="field-row triple">
        <input type="text" id="expMonth" placeholder="MM" autocomplete="cc-exp-month" maxlength="2">
        <input type="text" id="expYear" placeholder="YYYY" autocomplete="cc-exp-year" maxlength="4">
        <input type="text" id="cvv" placeholder="CVV" autocomplete="cc-csc" maxlength="4">
      </div>
      <input type="text" id="billingZip" placeholder="Billing ZIP (if different)" maxlength="10">
    </section>
  </main>

  <footer>
    <button id="saveBtn" class="btn-primary">Save Settings</button>
    <p class="footer-note">Your data is stored locally — never sent anywhere.</p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
